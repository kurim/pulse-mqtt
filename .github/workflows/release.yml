name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      Solution_Name: PCBridge.sln
      Project_Path:  PCBridge\PCBridge.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # v0.1.0-beta → 0.1.0-beta  (.NET akzeptiert kein führendes "v")
      - name: Extract version
        id: version
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore $env:Solution_Name --runtime win-x64

      - name: Publish (SingleFile, NoTrim)
        run: >
          dotnet publish $env:Project_Path
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishTrimmed=false
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output publish_output
          --no-restore

      - name: Create ZIP
        run: Compress-Archive -Path publish_output\PCBridge.exe -DestinationPath PCBridge-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PCBridge ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: PCBridge-${{ github.ref_name }}-win-x64.zip
