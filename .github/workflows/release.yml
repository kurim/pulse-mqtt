name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      Solution_Name: PCBridge.sln
      Project_Path:  PCBridge\PCBridge.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # v0.1.0-beta → 0.1.0-beta  (.NET akzeptiert kein führendes "v")
      - name: Extract version
        id: version
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore $env:Solution_Name --runtime win-x64

      # ── Self-contained Single-File (~70 MB, kein .NET nötig) ──────────────
      - name: Publish self-contained
        run: >
          dotnet publish $env:Project_Path
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishTrimmed=false
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output publish_sc
          --no-restore

      - name: ZIP self-contained
        run: >
          Compress-Archive
          -Path publish_sc\PCBridge.exe
          -DestinationPath PCBridge-${{ github.ref_name }}-win-x64.zip

      # ── Framework-dependent (~8 MB, benötigt .NET 8 Desktop Runtime) ──────
      - name: Publish framework-dependent
        run: >
          dotnet publish $env:Project_Path
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output publish_fx
          --no-restore

      - name: ZIP framework-dependent
        run: >
          Compress-Archive
          -Path publish_fx\PCBridge.exe
          -DestinationPath PCBridge-${{ github.ref_name }}-win-x64-net.zip

      # ── GitHub Release mit beiden ZIPs ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PCBridge ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Downloads

            | Datei | Größe | Voraussetzung |
            |---|---|---|
            | `PCBridge-${{ github.ref_name }}-win-x64.zip` | ~70 MB | keine – .NET Runtime eingebettet |
            | `PCBridge-${{ github.ref_name }}-win-x64-net.zip` | ~8 MB | [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) erforderlich |

            > Für Temperaturen und Watt-Werte wird zusätzlich der [PawnIO-Treiber](https://pawnio.eu/) benötigt.
          files: |
            PCBridge-${{ github.ref_name }}-win-x64.zip
            PCBridge-${{ github.ref_name }}-win-x64-net.zip
